services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_password
      POSTGRES_DB: iot_campus
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./config/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_user -d iot_campus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  hivemq:
    image: hivemq/hivemq-ce:latest
    ports:
      - "1883:1883"   # plaintext listener (internal use / diagnostics)
      - "8883:8883"   # TLS listener (device + gateway traffic)
      - "8080:8080"   # Control Center
    volumes:
      - ./config/hivemq/conf:/opt/hivemq/conf
      - ./config/hivemq/extensions:/opt/hivemq/extensions
      - ./config/certs:/opt/hivemq/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - iot-net

  tb-bridge:
    build: .
    command: ["python", "/app/scripts/tb_hivemq_bridge.py"]
    depends_on:
      thingsboard:
        condition: service_started
      hivemq:
        condition: service_started
    environment:
      TB_URL: http://thingsboard:9090
      TB_USER: tenant@thingsboard.org
      TB_PASS: tenant
      MQTT_BROKER_HOST: hivemq
      MQTT_BROKER_PORT: "8883"
      TB_INTEGRATION_USER: tb-integration
      TB_INTEGRATION_PASSWORD: ${TB_INTEGRATION_MQTT_PASSWORD:-tb-integration-secret}
      SECURITY_MQTT_TLS: "true"
      SECURITY_MQTT_CA_PATH: /certs/ca.crt
      SECURITY_MQTT_INSECURE_SKIP_VERIFY: "true"
    volumes:
      - ./config/certs:/certs:ro
    networks:
      - iot-net

  thingsboard:
    image: thingsboard/tb-postgres:3.7.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TB_QUEUE_TYPE: in-memory
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/thingsboard
      SPRING_DATASOURCE_USERNAME: iot_user
      SPRING_DATASOURCE_PASSWORD: iot_password
      INSTALL_TB: "true"
      LOAD_DEMO: "false"
    ports:
      - "9090:9090"
      - "1884:1883"
      - "7070:7070"
      - "5684:5683/udp"
    volumes:
      - tbdata:/data
      - tblogs:/var/log/thingsboard
    networks:
      - iot-net

  simulator:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      hivemq:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: iot_user
      DB_PASSWORD: iot_password
      DB_NAME: iot_campus
      MQTT_BROKER_HOST: hivemq
      MQTT_BROKER_PORT: "8883"
      SECURITY_MQTT_TLS: "true"
      SECURITY_MQTT_CA_PATH: /certs/ca.crt
      SECURITY_MQTT_INSECURE_SKIP_VERIFY: "true"
      MQTT_PASSWORD_SECRET: ${MQTT_PASSWORD_SECRET:-dev-master-secret}
      COAP_PSK_MASTER: ${COAP_PSK_MASTER:-dev-psk-master}
      ADMIN_MQTT_USER: ${ADMIN_MQTT_USER:-admin}
      ADMIN_MQTT_PASSWORD: ${ADMIN_MQTT_PASSWORD:-admin-secret}
      COAP_BIND_HOST: "0.0.0.0"
      COAP_ADVERTISE_HOST: simulator
      COAP_REGISTRY_PATH: /app/config/coap_registry.json
    volumes:
      - ./config:/app/config
      - ./config/certs:/certs:ro
    ports:
      - "5683-5782:5683-5782/udp"
    networks:
      - iot-net

  gateway-f01:
    build:
      context: ./config/gateways
      dockerfile: Dockerfile
    depends_on:
      hivemq:
        condition: service_started
    environment:
      FLOOR_ID: f01
      HIVEMQ_HOST: hivemq
      HIVEMQ_PORT: "8883"
      HIVEMQ_CA: /data/certs/ca.crt
      GATEWAY_USER: gw-f01
      GATEWAY_PASSWORD: ${GATEWAY_PASSWORD_F01:-gw-f01-secret}
      COAP_HOST: simulator
      COAP_BASE_PORT: "5683"
      ROOMS_PER_FLOOR: "20"
    volumes:
      - ./config/gateways/floor_01:/data
      - ./config/certs:/data/certs:ro
    networks:
      - iot-net

  gateway-f02:
    build:
      context: ./config/gateways
