building:
  id: "b01"
  floors: 10
  rooms_per_floor: 20

simulation:
  tick_interval: 5
  max_jitter: 5
  db_sync_interval: 30
  time_acceleration: 1.0

database:
  host: postgres
  port: 5432
  user: iot_user
  password: iot_password
  dbname: iot_campus

thermal:
  alpha: 0.01
  beta: 0.2
  default_temp: 22.0
  outside_temp: 35.0
  occupancy_heat: 0.05
  light_threshold: 300

mqtt:
  broker_host: hivemq
  broker_port: 8883
  topic_prefix: "campus"
  plaintext_port: 1883
  cmd_qos: 2
  response_qos: 2
  heartbeat_qos: 1
  status_qos: 1

transport:
  coap_rooms_per_floor: 10   # rooms 1..10 per floor -> CoAP
  mqtt_rooms_per_floor: 10   # rooms 11..20 per floor -> MQTT

coap:
  bind_host: "0.0.0.0"
  advertise_host: "simulator"
  base_port: 5683
  dtls_enabled: false          # toggle via env COAP_DTLS_ENABLED=true
  dtls_fallback_plaintext: true
  observable_max_age: 30

security:
  mqtt_tls: true
  mqtt_ca_path: "/certs/ca.crt"
  mqtt_client_cert_path: ""
  mqtt_insecure_skip_verify: true   # self-signed local CA, gmqtt verifies hostname
  mqtt_password_secret_env: MQTT_PASSWORD_SECRET
  coap_psk_master_env: COAP_PSK_MASTER
  mqtt_user_prefix: "room-"

faults:
  enabled: true
  probability: 0.01
  types:
    sensor_drift: true
    frozen_sensor: true
    telemetry_delay: true
    node_dropout: true

heartbeat:
  interval: 10
  timeout: 60

admin:
  client_id: "world-engine-admin"
  fleet_topic: "campus/b01/fleet/health"
  floor_summary_qos: 1
